<div class="dialog-backdrop" (click)="cancel()">
  <div class="dialog" (click)="$event.stopPropagation()">
    <div class="dialog-header">
      <span class="dialog-icon">⚙️</span>
      <div>
        <h2>OpenSky Einstellungen</h2>
        <p>
          Ein <strong>Cloudflare Worker</strong> als Proxy wird benötigt (kostenlos, ~5 min Setup).
          Anleitung:
          <a
            href="https://github.com/segore/FlightTracker/blob/main/cloudflare-worker/worker.js"
            target="_blank"
            rel="noopener"
            >cloudflare-worker/worker.js</a
          >
          in deinem Cloudflare-Dashboard deployen.
        </p>
      </div>
    </div>

    @if (openSky.hasWorker()) {
      <div class="current-user">
        ✅ Worker konfiguriert: <strong>{{ openSky.workerUrl() }}</strong>
      </div>
    }

    <div class="form-group">
      <label for="workerUrl">Cloudflare Worker URL <span class="required">*</span></label>
      <input
        id="workerUrl"
        type="url"
        [value]="workerUrl()"
        (input)="workerUrl.set($any($event.target).value)"
        placeholder="https://mein-worker.mein-name.workers.dev"
      />
    </div>

    <div class="form-group">
      <label for="clientId">
        OpenSky Client ID
        <span class="hint">(optional – für mehr Rate-Limit-Credits)</span>
      </label>
      <input
        id="clientId"
        type="text"
        [value]="clientId()"
        (input)="clientId.set($any($event.target).value)"
        placeholder="Client ID vom OpenSky Account-Dashboard"
      />
    </div>

    <div class="form-group">
      <label for="clientSecret">OpenSky Client Secret</label>
      <div class="password-row">
        <input
          id="clientSecret"
          [type]="showSecret() ? 'text' : 'password'"
          [value]="clientSecret()"
          (input)="clientSecret.set($any($event.target).value)"
          placeholder="Client Secret"
        />
        <button class="btn-toggle-pw" type="button" (click)="showSecret.set(!showSecret())">
          {{ showSecret() ? '🙈' : '👁️' }}
        </button>
      </div>
    </div>

    <div class="dialog-actions">
      @if (openSky.hasWorker()) {
        <button class="btn-remove" (click)="remove()">Einstellungen entfernen</button>
      }
      <button class="btn-cancel" (click)="cancel()">Abbrechen</button>
      <button class="btn-save" (click)="save()" [disabled]="!workerUrl().trim()">Speichern</button>
    </div>
  </div>
</div>
