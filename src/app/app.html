<div class="app-container">
  <!-- Header -->
  <header class="app-header">
    <div class="header-content">
      <div class="branding">
        <span class="logo">✈️</span>
        <div class="title-group">
          <h1 class="app-title">Svenni & Veronica</h1>
          <span class="app-subtitle">FlightTracker — Reise nach Indonesien · August 2026</span>
        </div>
      </div>
      <div class="header-actions">
        @if (tracking.rateLimitInfo()) {
          <span class="rate-limit-badge">⚠️ {{ tracking.rateLimitInfo() }}</span>
        }

        <!-- 3-state tracking mode switch -->
        <div class="mode-switch">
          <button
            class="mode-btn"
            [class.active]="tracking.trackingMode() === 'off'"
            (click)="setMode('off')"
            title="Tracking deaktiviert"
          >
            Aus
          </button>
          <button
            class="mode-btn"
            [class.active]="tracking.trackingMode() === 'manual'"
            (click)="setMode('manual')"
            title="Manuelles Polling per Knopfdruck"
          >
            Manuell
          </button>
          <button
            class="mode-btn mode-btn-live"
            [class.active]="tracking.trackingMode() === 'live'"
            (click)="setMode('live')"
            title="Automatisches Polling alle 30 Sekunden"
          >
            @if (tracking.trackingMode() === 'live') {
              <span class="pulse-dot"></span>
            }
            Live
          </button>
        </div>

        <!-- Manual poll trigger (only visible in manual mode) -->
        @if (tracking.trackingMode() === 'manual') {
          <button
            class="btn-poll"
            (click)="manualPoll()"
            [disabled]="tracking.isPolling()"
            title="Einmal abfragen"
          >
            @if (tracking.isPolling()) {
              ⏳
            } @else {
              🔄
            }
            Abfragen
          </button>
        }

        <button class="btn-clear" (click)="clearHistory()" title="Verlauf löschen">🗑️</button>
      </div>
    </div>
  </header>

  <!-- Main content -->
  <div class="main-content">
    <!-- Sidebar -->
    <aside class="sidebar">
      <app-flight-selector />
      <div class="sidebar-divider"></div>
      <app-info-panel />
    </aside>

    <!-- Map -->
    <main class="map-area">
      <app-map />
    </main>
  </div>
</div>
